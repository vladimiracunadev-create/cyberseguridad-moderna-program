name: Validar currículo

# Verifica en cada cambio que el currículo sigue íntegro:
# 17 partes, 310 clases sin huecos, cada clase con su README y
# todos los enlaces internos resueltos.

on:
  push:
    branches: [main]
    paths:
      - "classes/**"
      - "scripts/validar_estructura.py"
      - ".github/workflows/validar-curriculo.yml"
  pull_request:
    paths:
      - "classes/**"
      - "scripts/validar_estructura.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validar:
    name: Estructura y enlaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar estructura y enlaces internos
        run: python scripts/validar_estructura.py

      - name: Resumen
        if: always()
        run: |
          echo "### Programa de Ciberseguridad Moderna" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Partes: **$(find classes -mindepth 1 -maxdepth 1 -type d -name 'parte-*' | wc -l)**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Clases: **$(find classes -mindepth 3 -name README.md | wc -l)**" >> "$GITHUB_STEP_SUMMARY"
